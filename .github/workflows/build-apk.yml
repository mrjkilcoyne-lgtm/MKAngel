name: Build Android APK

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            autopoint \
            gettext \
            libtool \
            libtool-bin \
            libltdl-dev \
            m4 \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            git \
            zip \
            unzip \
            lld \
            patch

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          # Ensure autotools can find all m4 macros (libtool, gettext, etc.)
          export ACLOCAL_PATH="/usr/share/aclocal"
          export ACLOCAL="aclocal"

          # Buildozer requires main.py as the entry point
          cp main_android.py main.py

          # Build with output capture for error diagnosis
          yes | buildozer -v android debug 2>&1 | tee /tmp/build.log || {
            echo ""
            echo "========================================="
            echo "BUILD FAILED - Last 300 lines of output:"
            echo "========================================="
            tail -300 /tmp/build.log
            exit 1
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mkangel-apk
          path: bin/*.apk
          retention-days: 30
