name: Build Android APK

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Prepare entry point
        run: cp main_android.py main.py

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Find and collect APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Buildozer output filename: ${{ steps.buildozer.outputs.filename }} ==="
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \; 2>/dev/null || true
          ls -la apk-output/ 2>/dev/null || echo "No APKs found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkangel-apk
          path: apk-output/
          if-no-files-found: warn
          retention-days: 30
