name: Build Android APK

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            autopoint \
            gettext \
            libtool \
            libtool-bin \
            libltdl-dev \
            m4 \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            git \
            zip \
            unzip \
            lld \
            patch

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          # Pin Cython <3 — Cython 3.x removed 'long' builtin, breaking pyjnius
          pip install "cython<3" buildozer

      - name: Verify source structure
        run: |
          echo "=== Python files that will be packaged ==="
          find . -name "*.py" -not -path "./.git/*" -not -path "./.github/*" \
                 -not -path "./tests/*" -not -path "./.buildozer/*" | sort
          echo ""
          echo "=== Key package directories ==="
          ls -la glm/ app/
          echo ""
          echo "=== __init__.py files ==="
          find . -name "__init__.py" -not -path "./.git/*" | sort

      - name: Build APK
        run: |
          # NOTE: Do NOT use 'set -eo pipefail' here.
          # 'yes | buildozer | tee' always ends with SIGPIPE (broken pipe)
          # when buildozer finishes and closes stdin. With pipefail, that
          # kills the whole step even on a successful build.
          # Instead, we gate success on whether an APK file actually exists.

          # Ensure autotools can find all m4 macros (libtool, gettext, etc.)
          export ACLOCAL_PATH="/usr/share/aclocal"
          export ACLOCAL="aclocal"

          # Buildozer requires main.py as the entry point
          cp main_android.py main.py

          # CRITICAL: Remove setup.py and pyproject.toml so p4a doesn't think
          # this is a pip-installable package. When p4a sees these files, it only
          # copies main.py into private.tar and skips ALL subdirectories (glm/, app/).
          # Belt-and-suspenders with p4a.setup_py=false in buildozer.spec.
          rm -f setup.py pyproject.toml

          # Build — 'yes' answers SDK license prompts; tee captures logs
          yes | buildozer -v android debug 2>&1 | tee /tmp/build.log || true

          # Verify APK was actually produced — this is our real success gate
          if ! ls bin/*.apk 2>/dev/null; then
            echo ""
            echo "========================================="
            echo "BUILD FAILED - No APK produced!"
            echo "Last 100 lines of build log:"
            echo "========================================="
            tail -100 /tmp/build.log
            exit 1
          fi

          echo "✅ APK built successfully:"
          ls -lh bin/*.apk

      - name: Verify packaged modules in ACTUAL APK
        run: |
          echo "=== Verifying packages inside the ACTUAL APK ==="
          APK=$(ls bin/*.apk | head -1)
          echo "APK: $APK"

          # Extract private.tar from the APK and check its contents
          mkdir -p /tmp/apk_verify
          unzip -o "$APK" assets/private.tar -d /tmp/apk_verify

          echo ""
          echo "--- private.tar contents ---"
          tar tf /tmp/apk_verify/assets/private.tar | head -80

          echo ""
          echo "--- private.tar size ---"
          ls -lh /tmp/apk_verify/assets/private.tar

          MISSING=0
          tar tf /tmp/apk_verify/assets/private.tar | grep -q "glm/__init__" || { echo "FATAL: glm/ not in private.tar!"; MISSING=1; }
          tar tf /tmp/apk_verify/assets/private.tar | grep -q "app/__init__" || { echo "FATAL: app/ not in private.tar!"; MISSING=1; }
          tar tf /tmp/apk_verify/assets/private.tar | grep -q "glm/grammars/__init__" || { echo "FATAL: glm/grammars/ not in private.tar!"; MISSING=1; }

          if [ $MISSING -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "BUILD FAILED — critical packages missing from APK!"
            echo "========================================="
            echo "Full private.tar contents:"
            tar tf /tmp/apk_verify/assets/private.tar
            echo ""
            echo "Staging dir contents (these files EXIST but didn't make it to APK):"
            find .buildozer/android/app/ -name "*.py" 2>/dev/null | head -50
            exit 1
          fi

          echo ""
          echo "✅ glm/, app/, glm/grammars/ verified INSIDE the APK"
          echo "Grammar modules in APK:"
          tar tf /tmp/apk_verify/assets/private.tar | grep "glm/grammars/" | wc -l
          echo "App modules in APK:"
          tar tf /tmp/apk_verify/assets/private.tar | grep "^app/" | wc -l

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mkangel-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
