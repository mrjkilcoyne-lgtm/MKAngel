name: Build Android APK

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            autopoint \
            gettext \
            libtool \
            libtool-bin \
            libltdl-dev \
            m4 \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            git \
            zip \
            unzip \
            lld \
            patch

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          # Pin Cython <3 — Cython 3.x removed 'long' builtin, breaking pyjnius
          pip install "cython<3" buildozer

      - name: Verify source structure
        run: |
          echo "=== Python files that will be packaged ==="
          find . -name "*.py" -not -path "./.git/*" -not -path "./.github/*" \
                 -not -path "./tests/*" -not -path "./.buildozer/*" | sort
          echo ""
          echo "=== Key package directories ==="
          ls -la glm/ app/
          echo ""
          echo "=== __init__.py files ==="
          find . -name "__init__.py" -not -path "./.git/*" | sort

      - name: Build APK
        run: |
          # NOTE: Do NOT use 'set -eo pipefail' here.
          # 'yes | buildozer | tee' always ends with SIGPIPE (broken pipe)
          # when buildozer finishes and closes stdin. With pipefail, that
          # kills the whole step even on a successful build.
          # Instead, we gate success on whether an APK file actually exists.

          # Ensure autotools can find all m4 macros (libtool, gettext, etc.)
          export ACLOCAL_PATH="/usr/share/aclocal"
          export ACLOCAL="aclocal"

          # Buildozer requires main.py as the entry point
          cp main_android.py main.py

          # Build — 'yes' answers SDK license prompts; tee captures logs
          yes | buildozer -v android debug 2>&1 | tee /tmp/build.log || true

          # Verify APK was actually produced — this is our real success gate
          if ! ls bin/*.apk 2>/dev/null; then
            echo ""
            echo "========================================="
            echo "BUILD FAILED - No APK produced!"
            echo "Last 100 lines of build log:"
            echo "========================================="
            tail -100 /tmp/build.log
            exit 1
          fi

          echo "✅ APK built successfully:"
          ls -lh bin/*.apk

      - name: Verify packaged modules
        if: always()
        run: |
          echo "=== Python files in build app directory ==="
          find .buildozer/android/app/ -name "*.py" 2>/dev/null | sort | head -80 || echo "Build dir not found"
          echo ""
          echo "=== glm package in build ==="
          ls -la .buildozer/android/app/glm/ 2>/dev/null || echo "glm/ NOT FOUND in build — packaging issue!"
          echo "=== app package in build ==="
          ls -la .buildozer/android/app/app/ 2>/dev/null || echo "app/ NOT FOUND in build — packaging issue!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mkangel-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
