name: Build Android APK

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            autopoint \
            gettext \
            libtool \
            libtool-bin \
            libltdl-dev \
            m4 \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            git \
            zip \
            unzip \
            lld \
            patch

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          # Pin Cython <3 — Cython 3.x removed 'long' builtin, breaking pyjnius
          pip install "cython<3" buildozer

      - name: Build APK
        run: |
          set -euo pipefail

          # Ensure autotools can find all m4 macros (libtool, gettext, etc.)
          export ACLOCAL_PATH="/usr/share/aclocal"
          export ACLOCAL="aclocal"

          # Buildozer requires main.py as the entry point
          cp main_android.py main.py

          # Build — use script to provide pseudo-tty for buildozer prompts
          yes | buildozer -v android debug 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[2]}

          # Verify APK was actually produced
          if ! ls bin/*.apk 2>/dev/null; then
            echo ""
            echo "========================================="
            echo "BUILD FAILED - No APK produced!"
            echo "Last 100 lines of build log:"
            echo "========================================="
            tail -100 /tmp/build.log
            exit 1
          fi

          echo "✅ APK built successfully:"
          ls -lh bin/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mkangel-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
